<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
    <table class="table" id="student-table">
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Dept</th>
            <th>Courses</th>
        </tr>
    </table>

    <button class="btn btn-md btn-dark" onclick="generateMatric()">generate Matric number</button>
    <div class="mt-5 mx-2" id="display"></div>
    <div class="card col-6 mx-auto my-5 position-absolute text-center" id="options" style="display: none;">
        <!-- <span>Are you sure you want to delete this item?</span> -->
    </div>

    <script>
        // Array - [] | Objects - {}
        // Objects - are a group of related items

        const students = ['taiwo', 'Temi', 'Emmanuel'];

        let student_details = {
            name: 'Oseoluwa',
            age: 21,
            dept: 'FULSTACK',
            Courses: ['javascript', 'VCS', 'firebase']
        };

        console.log(student_details.name);
        // key-value pair
        
        // student_details.name = 'sirdam'
        // student_details.age = student_details.age + 1
        // console.log(student_details);
        student_details = {...student_details,  name: 'sirdam', age: student_details.age -1, courses: ['javascript', 'VCS', 'Bootstrap']};

        const student_table = document.getElementById('student-table');
        
        student_table.innerHTML += `<tr>
            <td>${student_details.name}</td>
            <td>${student_details.age}</td>
            <td>${student_details.dept}</td>
            <td>${student_details.Courses}</td>
            </tr>`
            console.log(student_details);

            const matric_numbers = [];

            function generateMatric() {

                const matric_no = `2026${Math.floor(Math.random()*1000000)}`;
                matric_numbers.push(matric_no);
                console.log(matric_numbers);
                const display = document.getElementById('display');
                display.innerHTML = ''
                for(let i=0; i < matric_numbers.length; i++){
                    display.innerHTML += `
                    <div class="card col-3 my-1 d-flex justify-content-between">
                        <span>${matric_numbers[i]}</span>
                        <span class="ms-auto fw-bold" onclick="showOptions(${i})">X</span>
                        </div>
                    `
                }
            }
            function showOptions(matId) {
                const options = document.getElementById('options');

                options.innerHTML = `
                <span>Are you sure you want to delete this item?</span>

                <div>
                <button class="btn btn-success" onclick="deleteMatric(${matId})">Yes</button>
                <button class="btn btn-danger" onclick="decline()">No</button>
                </div>
                `
                options.style.display = 'block';
            } 

            function decline() {
                options.style.display = 'none';
            }

            function deleteMatric(matId) {
                matric_numbers.splice(matId, 1)

                display.innerHTML = ""
                for(let i=0; i < matric_numbers.length; i++){
                    display.innerHTML += `
                    <div class="card col-3 my-1 d-flex justify-content-between">
                        <span>${matric_numbers[i]}</span>
                        <span class="ms-auto fw-bold" onclick="showOptions(${i})">X</span>
                        </div>
                    `
                }
                options.style.display = 'none';
            }
    </script>
</body>
</html>
