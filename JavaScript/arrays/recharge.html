<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickPin Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-pin {
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 2px;
            font-weight: bold;
        }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h3>Recharge Card Generator</h3>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Select Network</label>
                        <select id="network" class="form-select">
                            <option value="MTN">MTN (16-digits)</option>
                            <option value="Airtel">Airtel (16-digits)</option>
                            <option value="Glo">Glo (15-digits)</option>
                            <option value="9Mobile">9Mobile (15-digits)</option>
                        </select>
                    </div>
                    
                    <button onclick="generatePin()" class="btn btn-success w-100 mb-4">Generate PIN</button>

                    <div id="displayArea" class="d-none">
                        <div class="alert alert-secondary text-center">
                            <small class="text-muted d-block mb-1" id="cardNetwork"></small>
                            <h4 class="card-pin mb-0" id="pinOutput"></h4>
                        </div>
                        <button onclick="copyPin()" class="btn btn-sm btn-outline-secondary d-block mx-auto">Copy PIN</button>
                    </div>
                </div>
            </div>

            <div class="mt-4">
                <h5>Recent Generations</h5>
                <ul id="history" class="list-group">
                    <li class="list-group-item text-muted text-center">No pins generated yet.</li>
                </ul>
            </div>
        </div>
    </div>
</div>

<script>
    function generatePin() {
        const network = document.getElementById('network').value;
        const pinLength = (network === 'MTN' || network === 'Airtel') ? 16 : 15;
        let pin = '';

        // Generate random digits
        for (let i = 0; i < pinLength; i++) {
            pin += Math.floor(Math.random() * 10);
        }

        // Format PIN with dashes for readability (e.g., 1234-5678-...)
        const formattedPin = pin.match(/.{1,4}/g).join('-');

        // UI Updates
        document.getElementById('displayArea').classList.remove('d-none');
        document.getElementById('pinOutput').innerText = formattedPin;
        document.getElementById('cardNetwork').innerText = network.toUpperCase();

        addToHistory(network, formattedPin);
    }

    function addToHistory(network, pin) {
        const historyList = document.getElementById('history');
        if (historyList.innerText === "No pins generated yet.") historyList.innerHTML = '';

        const li = document.createElement('li');
        li.className = 'list-group-item d-flex justify-content-between align-items-center';
        li.innerHTML = `<span><strong>${network}:</strong> ${pin}</span> <span class="badge bg-info rounded-pill">${new Date().toLocaleTimeString()}</span>`;
        
        historyList.prepend(li);
    }

    function copyPin() {
        const pin = document.getElementById('pinOutput').innerText.replace(/-/g, '');
        navigator.clipboard.writeText(pin);
        alert("PIN copied to clipboard!");
    }
</script>

</body>
</html>
