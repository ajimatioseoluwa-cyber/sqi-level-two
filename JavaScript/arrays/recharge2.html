<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-secondary">

    <div class="d-flex justify-content-center gap-3 align-items-center rounded-3 bg-warning p-5" style="flex-direction: column; width: auto; margin: 100px;">
        <span class="label fs-3">Recharge Card Generator</span>
    <select name="" class="rounded-pill p-3" id="network">
        <option value="MTN">MTN</option>
        <option value="Airtel">Airtel</option>
        <option value="Glo">Glo</option>
        <option value="9Mobile">9mobile</option>
    </select>

    <select name="" class="rounded-pill p-3" id="amount">
        <option value="100">N100</option>
        <option value="200">N200</option>
        <option value="500">N500</option>
        <option value="1000">N1000</option>
    </select>

    <input type="number" id="howMany" class="rounded-pill">

    <button onclick="generateRecharge()" class="rounded-pill btn btn-dark btn-lg">generate</button>
    <p id="results"></p>
    <div class="card" id="options" style="display: none;">

    </div>
    </div>
    <script >
        let pin = [];
        
        function generateRecharge() { 
            let network = document.getElementById('network').value;
            let amount =  document.getElementById('amount').value;
            let results = document.getElementById('results');
            let userInput = document.getElementById('howMany').value;
            
            // const randomNumber = Math.floor(Math.random()*10000000000000000);          
            
            // let cardObject = {
            //     cardNet: network,
            //     cardAmt: amount,
            //     cardPin: randomNumber
            // };
            
            // pin.push(cardObject)
            for (let j=0; j < userInput; j++){
                const randomNumber = Math.floor(Math.random()*10000000000000000);            
        
                let cardObject = {
                    cardNet: network,
                    cardAmt: amount,
                    cardPin: randomNumber
                };

                pin.push(cardObject);
            }
            
            
            results.innerHTML = ''
            for (let i=0; i < pin.length; i++) {
                results.innerHTML += `
                <div class="p-2 border mb-2 shadow-sm rounded bg-white">
                    <strong>${pin[i].cardNet}</strong> - N${pin[i].cardAmt} <br>
                    <span class="text-primary fw-bold">${pin[i].cardPin}</span>
                    <span onclick="showOptions(${i})" style = "cursor: pointer;">cancel</span>
                    </div>`;
                }
                
                                
            
        }
            
            function showOptions(val) {
            const options = document.getElementById('options');

                options.innerHTML = `
                <span>Are you sure you want to delete this item?</span>

                <div class= "d-flex justify-content-center">
                <button class="btn btn-success" onclick="deleteMatric(${val})">Yes</button>
                <button class="btn btn-danger" onclick="decline()">No</button>
                </div>
                `
                options.style.display = 'block';
             }
            function decline() {
                options.style.display = 'none';
            }

            function deleteMatric(val) {
                pin.splice(val, 1)

                results.innerHTML = ''
                for (let i=0; i < pin.length; i++) {
                results.innerHTML += `
                <div class="p-2 border mb-2 shadow-sm rounded bg-white">
                    <strong>${pin[i].cardNet}</strong> - N${pin[i].cardAmt} <br>
                    <span class="text-primary fw-bold">${pin[i].cardPin}</span>
                    <span onclick="showOptions(${i})" style = "cursor: pointer;">cancel</span>
                    </div>`;
                }
                options.style.display = 'none';
            }
    </script>
</body>
</html>
