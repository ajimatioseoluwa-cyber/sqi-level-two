<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="col-lg-5 col-md-7 col-9 mx-auto p-lg-5 p-3 border-3 shadow mt-lg-5 mt-3">
        <h3 class="text-center">INEC Vote Eligibility Checker</h3>
        <div  class="alert alert-danger text-center p-2 fw-bold fs-6" id="errorMsg" style="display: none;">input cannot be empty</div>
        <input type="number" class="form-control form-control-sm shadow-none my-2" placeholder="Enter your year of birth" id="userDate">
        <button class="btn btn-outline-dark btn-sm w-100 my-3"  onclick="checkEli()">Check eligibility</button>
s
        <p id="showInfo"></p>
    </div>
</body>
<script>
    function checkEli() {
        if(userDate.value == ''){
            errorMsg.style.display = 'block'
        } else {
            const yearOfBirth = Number(userDate.value)
            console.log(yearOfBirth);
            const age = 2026 - yearOfBirth
            console.log(age);
            if(age >= 18) {
                // console.log('congrats')
                // document.getElementById("results").textContent = "" + age
                showInfo.innerHTML = ''
                showInfo.innerHTML = '<div class="alert alert-success text-center p-2 fw-bold fs-6">congrats</div>'
            } else {
                // console.log('not eligible');
                // document.getElementById("results").textContent = age
                showInfo.innerHTML = ''
                showInfo.innerHTML =`<div class="alert alert-success text-center p-2 fw-bold fs-6">grow up fast, you have ${18 - age}yrs to be eligible </div>`
            }
        }
    }
</script>
</html>
