<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ambulance records</title>
  <style>
     .pulse-bg {
            animation: pulse-red 2s infinite;
        }
        @keyframes pulse-red {
            0% { background-color: #fff3cd; }
            50% { background-color: #ffe5d0; }
            100% { background-color: #fff3cd; }
        }
  </style>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha1/css/bootstrap.min.css" integrity="sha384-r4NyP46KrjDleawBgD5tp8Y7UzmLA05oM1iAEQ17CSuDqnUK2+k9luXQOfXJCJ4I" crossorigin="anonymous">
</head>
<body>
<h2 class="text-center mb-4 mt-5 fs-2">Hospital Emergency System</h2>
<div class="container d-flex gap-5">

    <!-- user phone -->
    <div id="userPhone" class="">
        <div id="phoneUser" class="shadow d-flex flex-column ps-3 pe-3 pb-3 border border-black border-5 m-4" style="border-radius: 20px; background: linear-gradient(180deg, black, rgb(245, 151, 166)); width: 25vw;">
            
            <div class="d-flex align-items-center p-2 justify-content-around" style="border-radius: 20px 20px 0px 0px;">
                <div class="d-flex align-items-center">
                    
                    <p>
                        <p id="time" class="text-light">
                            <img src="ic--round-phone.svg" alt="">
                        </p>
                    </div>
                    <img src="material-symbols--camera-outline-rounded.svg" alt="">
                    <div class="d-flex align-items-center">
                        <p class="text-light">
                            <img src="logos--google-maps.svg" alt="">
                            <img src="uil--signal.svg" alt="">
                            62% <img src="ic--baseline-battery-50.svg" alt=""></p>
                    </div>
                </div>
                <small class="alert text-light text-center">In an Emergency call 911</small>
                <div class="mt-3">
                    <input type="text" id="userName" class="form-control form-control-sm mb-2" placeholder="Your Name">
                    <input type="text" id="userLocation" class="form-control form-control-sm mb-2" placeholder="Your Address">
                </div>    
                <input type="text" value="911" class="text-light text-center" style="margin-bottom: 200px; background: transparent; outline: none; border: none;">
                    <button onclick="actionDial()" style="margin-left: 120px;" class="rounded-circle btn btn-success btn-sm w-25"><img src="ic--round-phone.svg" alt=""></button>
                    
                </div>
                
            </div>
            <!-- ambulance -->
            <div class="w-50">
                <div id="ambulanceCard" class="card shadow border-0 h-100">
                    <div class="card-header bg-dark text-white fw-bold d-flex justify-content-between">
                        <span>AMBULANCE TERMINAL</span> 
                    </div>
                    
                    <div class="card-body d-flex flex-column justify-content-center align-items-center p-5">
                        
                        <div id="idleScreen" class="text-center">
                            <div class="spinner-grow text-primary mb-3" role="status"></div>
                            <h4 class="text-muted">Scanning for alerts...</h4>
                        </div>
                        
                        <div id="activeAlert" class="w-100 text-center" style="display: none;">
                            <h2 class="text-danger fw-black mb-3">DISPATCH ALERT</h2>
                            <div class="p-3 mb-4 rounded-3 border border-warning pulse-bg">
                                <h5 class="m-0 text-dark">Location: Unknown (GPS Signal Active)</h5>
                                <small class="text-muted">Caller ID: Citizen Anonymous</small>
                            </div>
                            <div class="d-flex gap-3 justify-content-center">
                                <button class="btn btn-success btn-lg px-5 shadow" onclick="decide('Accepted')">ACCEPT</button>
                                <button class="btn btn-outline-danger btn-lg px-5" onclick="decide('Rejected')">REJECT</button>
                            </div>
                        </div>
                        
                    </div>
                </div>
            </div>  
            
</div>
<table class="table" id="historyTable">
    <tr>
        <th>s/n</th>
        <th>caller name</th>
        <th>address</th>
        <th>status</th>
    </tr>
</table>
<script src="script.js"></script>
</body>
</html>
