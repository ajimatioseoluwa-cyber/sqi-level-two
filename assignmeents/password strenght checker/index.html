        function check() {
    const password = document.getElementById('userInput').value;
    const invalid = document.getElementById('invalid');
    const results = document.getElementById('results');

    // Clear previous messages
    invalid.innerHTML = '';
    results.innerHTML = '';

    // 1. Basic Validation
    if (password === '') {
        invalid.innerHTML = '<p style="color: blue">Please enter a password</p>';
        return; // Stop execution
    }

    if (password.length < 8) {
        invalid.innerHTML = '<p style="color: red">Password must be at least 8 characters</p>';
    }

    // 2. Strength Checks (using Regular Expressions)
    const hasUpperCase = /[A-Z]/.test(password);
    const hasLowerCase = /[a-z]/.test(password);
    const hasDigit = /[0-9]/.test(password);
    const hasSpecial = /[!@#$%^&*]/.test(password);

    // 3. Determine Strength
    let strength = 0;
    if (hasUpperCase) strength++;
    if (hasLowerCase) strength++;
    if (hasDigit) strength++;
    if (hasSpecial) strength++;

    // 4. Display Results
    if (strength === 4 && password.length >= 8) {
        results.innerHTML = '<p style="color: green">Strength: Very Strong</p>';
    } else if (strength >= 2) {
        results.innerHTML = '<p style="color: orange">Strength: Medium</p>';
    } else {
        results.innerHTML = '<p style="color: red">Strength: Weak</p>';
    }
}
