    <style>
        /* CSS Reset & Variables */
        :root {
            --primary: #00d4ff;
            --bg-dark: #121212;
            --nav-bg: #1a1a1a;
            --text-main: #ffffff;
            --transition: all 0.4s cubic-bezier(0.77, 0.2, 0.05, 1.0);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0f0f0f;
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* --- Main Navbar --- */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 8%;
            height: 80px;
            background: var(--nav-bg);
            position: sticky;
            top: 0;
            z-index: 2000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .logo span { color: var(--primary); }

        .nav-links {
            display: flex;
            list-style: none;
        }

        .nav-links li { margin-left: 35px; }

        .nav-links a {
            text-decoration: none;
            color: #ccc;
            font-weight: 500;
            transition: var(--transition);
        }

        .nav-links a:hover { color: var(--primary); }

        /* Mobile Toggle Icon */
        .menu-toggle {
            display: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-main);
            transition: 0.3s;
        }

        /* --- Side Icon Bar (Responsive) --- */
        .side-icon-bar {
            position: fixed;
            top: 0;
            right: 0;
            height: 100vh;
            width: 90px;
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(10px); /* Modern blur effect */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            transform: translateX(100%);
            transition: var(--transition);
            z-index: 1500;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        .side-icon-bar.active {
            transform: translateX(0);
        }

        .icon-item {
            color: #777;
            font-size: 24px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transition: 0.3s;
        }

        .icon-item span {
            font-size: 10px;
            text-transform: uppercase;
            margin-top: 8px;
            font-weight: 600;
            opacity: 0;
            transition: 0.3s;
        }

        .icon-item:hover, .icon-item.active-link {
            color: var(--primary);
        }

        .icon-item:hover span {
            opacity: 1;
        }

        /* Responsive Logic */
        @media screen and (max-width: 850px) {
            .nav-links { display: none; }
            .menu-toggle { display: block; }
        }

        /* Content Placeholder */
        .hero {
            height: 120vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .hero h1 { font-size: 3rem; margin-bottom: 20px; }
        .hero p { color: #888; max-width: 600px; }
    </style>

        <style>
            /* custom styles to tweak Bootstrap's default offcanvas */
            :root {
                --side-width: 80px;
            }
    
            body { background-color: #f8f9fa; }

            .offcanvas-icons {

            }
    
            .offcanvas-body {
                display: flex;

                transition: 0.3s;
                text-decoration: none;
                display: flex;
                flex-direction: column;

            }
    
            .nav-icon:hover {
                color: #fff;
            }
    
            .nav-icon span {
                font-size: 0.65rem;
                text-transform: uppercase;
                margin-top: 5px;
            }
    
            /* Hide desktop nav on small screens */
            @media (max-width: 991px) {

        <script>

            // Toggle the Sidebar

            // Toggle the Hamburger to 'X' icon

                iconElement.classList.remove('fa-bars');
                iconElement.classList.add('fa-times');
