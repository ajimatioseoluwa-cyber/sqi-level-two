        function confam() {
    // Convert values to Numbers so the math works correctly
    const weight = Number(document.getElementById('userInput').value);
    const age = Number(document.getElementById('useRInput').value);
    const results = document.getElementById('results');

    // 1. Logic for Children (Under 15)
    if (age < 15) {
        if (weight >= 90) {
            results.innerHTML = 'You are over weight';
        } else if (weight >= 40 && weight < 50) {
            results.innerHTML = 'You are at the appropriate weight';
        } else if (weight < 40) {
            results.innerHTML = 'You are under weight';
        } else {
            results.innerHTML = 'Weight is outside general child range';
        }
    } 
    // 2. Logic for Adults/Seniors
    else if (age >= 18) {
        if (weight >= 90) {
            results.innerHTML = 'You are over weight';
        } else if (weight >= 45 && weight <= 70) {
            results.innerHTML = 'You are at the appropriate weight';
        } else {
            results.innerHTML = 'Check with a specialist';
        }
    } 
    else {
        results.innerHTML = 'Age group not defined';
    }
}
